<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ERP Simples - Relatório</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav style="margin-bottom: 20px;">
        <a href="/produtos" style="margin-right: 15px;">Produtos</a>
        <a href="/clientes" style="margin-right: 15px;">Clientes</a>
        <a href="/vendas" style="margin-right: 15px;">Vendas</a>
        <a href="/relatorio">Relatório</a>
    </nav>

    <h1>Relatório</h1>

    <p><strong>Total vendido:</strong> R$ {{ "%.2f"|format(total_vendido) }}</p>

    <h2>Produtos mais vendidos</h2>
    <table>
        <tr>
            <th>Produto</th>
            <th>Quantidade vendida</th>
        </tr>
        {% for item in mais_vendidos %}
        <tr>
            <td>{{ item.nome }}</td>
            <td>{{ item.total_vendido }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
