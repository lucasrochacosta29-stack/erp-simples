<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ERP Simples - Editar Cliente</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav style="margin-bottom: 20px;">
        <a href="/produtos" style="margin-right: 15px;">Produtos</a>
        <a href="/clientes" style="margin-right: 15px;">Clientes</a>
        <a href="/vendas" style="margin-right: 15px;">Vendas</a>
        <a href="/relatorio">Relatório</a>
    </nav>

    <h1>Editar Cliente</h1>

    <form action="/clientes/editar/{{ cliente.id }}" method="POST">
        <input type="text" name="nome" value="{{ cliente.nome }}" required>
        <input type="text" name="contato" value="{{ cliente.contato }}">
        <button type="submit">Salvar</button>
    </form>
</body>
</html>
