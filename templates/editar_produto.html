<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ERP Simples - Editar Produto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav style="margin-bottom: 20px;">
        <a href="/produtos" style="margin-right: 15px;">Produtos</a>
        <a href="/clientes" style="margin-right: 15px;">Clientes</a>
        <a href="/vendas" style="margin-right: 15px;">Vendas</a>
        <a href="/relatorio">Relatório</a>
    </nav>

    <h1>Editar Produto</h1>

    <form action="/produtos/editar/{{ produto.id }}" method="POST">
        <input type="text" name="nome" value="{{ produto.nome }}" required>
        <input type="number" step="0.01" name="preco" value="{{ produto.preco }}" required>
        <input type="number" name="quantidade" value="{{ produto.quantidade }}" required>
        <button type="submit">Salvar</button>
    </form>
</body>
</html>
