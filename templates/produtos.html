<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ERP Simples - Produtos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav style="margin-bottom: 20px;">
        <a href="/produtos" style="margin-right: 15px;">Produtos</a>
        <a href="/clientes" style="margin-right: 15px;">Clientes</a>
        <a href="/vendas" style="margin-right: 15px;">Vendas</a>
        <a href="/relatorio">Relatório</a>
    </nav>

    <h1>Produtos</h1>

    <form action="/produtos/novo" method="POST">
        <input type="text" name="nome" placeholder="Nome do produto" required>
        <input type="number" step="0.01" name="preco" placeholder="Preço" required>
        <input type="number" name="quantidade" placeholder="Quantidade" required>
        <button type="submit">Cadastrar</button>
    </form>

    <hr>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Quantidade</th>
        </tr>
        {% for produto in produtos %}
        <tr>
            <td>{{ produto.id }}</td>
            <td>{{ produto.nome }}</td>
            <td>R$ {{ produto.preco }}</td>
            <td>{{ produto.quantidade }}</td>
            <td>
                <a href="/produtos/editar/{{ produto.id }}">Editar</a>
                <form action="/produtos/excluir/{{ produto.id }}" method="POST" style="display:inline;">
                    <button type="submit">Excluir</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
